version: '3.8'
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: restaurant_admin
      POSTGRES_PASSWORD: secure_password
      POSTGRES_DB: restaurant_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://restaurant_admin:secure_password@db:5432/restaurant_db
      - JWT_SECRET=super_secret_key_change_in_prod
      - NODE_ENV=development
    depends_on:
      - db

volumes:
  postgres_data: